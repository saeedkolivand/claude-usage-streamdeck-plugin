name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin bundle
        run: npm run build

      - name: Validate manifest
        run: npx streamdeck validate com.saeedkolivand.claude-usage.sdPlugin

      - name: Package plugin
        run: npx streamdeck pack com.saeedkolivand.claude-usage.sdPlugin --output dist --force

      - name: Upload packaged plugin
        uses: actions/upload-artifact@v4
        with:
          name: streamdeck-plugin
          path: dist/com.saeedkolivand.claude-usage.streamDeckPlugin
          if-no-files-found: error
